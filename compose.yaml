services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      BUNDLE_PATH: /gems
      BUNDLE_APP_CONFIG: /gems
    volumes:
      - .:/app:delegated
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
